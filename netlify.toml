[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/ulkeler"
  to = "/vizesiz-ulkeler"
  status = 301

[[redirects]]
  from = "/pasaport-sıralaması"
  to = "/pasaport-siralamasi"
  status = 301

[[redirects]]
  from = "/vize-gerekli-ulkeler"
  to = "/vize-gerekli"
  status = 301

[[redirects]]
  from = "/vizesiz"
  to = "/vizesiz-ulkeler"
  status = 301

[[redirects]]
  from = "/kapida-vize-ulkeler"
  to = "/kapida-vize"
  status = 301

[[redirects]]
  from = "/e-vize-ulkeler"
  to = "/e-vize"
  status = 301

[[redirects]]
  from = "/pasaport-karşılaştır"
  to = "/pasaport-karsilastir"
  status = 301

[[redirects]]
  from = "/kaç-gün-kalabilirim"
  to = "/kac-gun-kalabilirim"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
